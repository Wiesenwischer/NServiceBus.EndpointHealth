name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Use a PAT (or GitHub App token) stored as RELEASE_PLEASE_TOKEN so that
      # the tag release-please pushes can trigger the release workflow.
      # The default GITHUB_TOKEN cannot trigger other workflows (loop guard),
      # so without this secret no tag-driven workflow would ever fire.
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release is created, release-please creates a tag (e.g., v0.3.0)
      # The existing CI workflow will trigger on this tag and handle:
      # - Building with version from tag
      # - Creating GitHub Release
      # - Publishing to NuGet
